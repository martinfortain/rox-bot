<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROX — Bot de Atención</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap');
 
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: #2a2a3a;
    --accent: #c8a96e;
    --accent-dim: rgba(200, 169, 110, 0.12);
    --text: #e8e8f0;
    --text-dim: #7a7a9a;
    --bot-bubble: #1c1c27;
    --user-bubble: #c8a96e;
    --user-bubble-text: #0a0a0f;
    --green: #4ade80;
    --red: #f87171;
  }
 
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    line-height: 1.5;
  }
 
  /* Layout */
  .shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }
 
  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
 
  .avatar {
    width: 42px;
    height: 42px;
    background: var(--accent-dim);
    border: 1.5px solid var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -1px;
    flex-shrink: 0;
  }
 
  .header-info { flex: 1; }
 
  .header-name {
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.03em;
    color: var(--text);
  }
 
  .header-status {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 1px;
  }
 
  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
  }
 
  .header-badge {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    padding: 2px 8px;
    border-radius: 2px;
    letter-spacing: 0.08em;
  }
 
  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }
 
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
 
  .msg-row {
    display: flex;
    gap: 8px;
    max-width: 88%;
    animation: fadeUp 0.2s ease;
  }
 
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
 
  .msg-row.bot { align-self: flex-start; }
  .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
 
  .msg-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    color: var(--accent);
    flex-shrink: 0;
    margin-top: 2px;
  }
 
  .bubble {
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.55;
    white-space: pre-wrap;
  }
 
  .msg-row.bot .bubble {
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }
 
  .msg-row.user .bubble {
    background: var(--user-bubble);
    color: var(--user-bubble-text);
    border-top-right-radius: 4px;
    font-weight: 500;
  }
 
  /* Typing indicator */
  .typing {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 12px 14px;
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-radius: 16px;
    border-top-left-radius: 4px;
    width: fit-content;
  }
 
  .typing span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
    animation: bounce 1.2s infinite;
  }
 
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
 
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }
 
  /* Quick replies */
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 0 16px 12px;
    flex-shrink: 0;
  }
 
  .qr-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 6px 12px;
    border-radius: 20px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }
 
  .qr-btn:hover {
    background: var(--accent-dim);
    border-color: var(--accent);
  }
 
  /* Input */
  .input-area {
    padding: 12px 16px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }
 
  textarea {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    resize: none;
    outline: none;
    min-height: 42px;
    max-height: 120px;
    line-height: 1.4;
    transition: border-color 0.15s;
  }
 
  textarea::placeholder { color: var(--text-dim); }
  textarea:focus { border-color: var(--accent); }
 
  .send-btn {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s, transform 0.1s;
  }
 
  .send-btn:hover { opacity: 0.85; }
  .send-btn:active { transform: scale(0.93); }
  .send-btn:disabled { opacity: 0.35; cursor: default; }
 
  .send-btn svg { width: 18px; height: 18px; fill: var(--bg); }
 
  /* Reset */
  .reset-btn {
    position: fixed;
    top: 16px;
    right: calc(50% - 240px + 12px);
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 10px;
    border-radius: 6px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    z-index: 10;
  }
 
  .reset-btn:hover { border-color: var(--text-dim); color: var(--text); }
 
  @media (max-width: 480px) {
    .reset-btn { right: 12px; }
  }
</style>
</head>
<body>
 
<div class="shell">
  <div class="header">
    <div class="avatar">RX</div>
    <div class="header-info">
      <div class="header-name">ROX</div>
      <div class="header-status">
        <div class="status-dot"></div>
        <span>Atención automática</span>
      </div>
    </div>
    <div class="header-badge">BOT</div>
  </div>
 
  <div class="messages" id="messages"></div>
 
  <div class="quick-replies" id="quickReplies"></div>
 
  <div class="input-area">
    <textarea id="input" placeholder="Escribí tu mensaje..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="send()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>
 
<button class="reset-btn" onclick="resetChat()">↺ Reiniciar</button>
 
<script>
const SYSTEM_PROMPT = `Sos el asistente virtual de ROX, un boliche/bar ubicado en 11 N° 885 entre 49 y 50, La Plata. Respondés de forma amigable, breve y directa, como si fueras una persona real del equipo de ROX. Usás español rioplatense (vos, tenés, etc). No usás emojis en exceso — máximo uno por mensaje y solo cuando suma. No usás listas con viñetas. Escribís en párrafos cortos conversacionales.
 
INFORMACIÓN DE ROX:
- Horario: viernes y sábados de 00 a 06 AM
- Dirección: 11 N° 885 entre 49 y 50, La Plata
 
PRECIOS VIERNES:
- $7.500 en efectivo (incluye 1 trago clásico)
- $8.000 con Mercadopago (incluye 1 trago clásico)
- $4.000 en efectivo (incluye 1 chupito)
- $4.500 con Mercadopago (incluye 1 chupito)
 
PRECIOS SÁBADO:
- $8.000 en efectivo (incluye 1 trago clásico)
- $9.500 con Mercadopago (incluye 1 trago clásico)
 
LISTA DE INVITADOS:
- Ingreso free hasta la 1 AM para quienes estén en lista
- Para anotarse se necesita: nombre, apellido y DNI
- La lista se cierra antes de la 1 AM
 
Si alguien quiere anotarse en la lista, pediles nombre, apellido y DNI de cada persona del grupo. Una vez que los tenés, confirmales que quedaron anotados y recordales que el ingreso free es hasta la 1 AM.
 
Si te preguntan algo que no sabés, decí que los contacten por Instagram @rox.lp o que se acerquen el mismo día.
 
Nunca inventés información que no tenés. Nunca des precios de consumiciones adicionales (no los tenés).`;
 
let history = [];
let isTyping = false;
 
const QUICK_REPLIES_INIT = [
  "¿Cuánto sale la entrada?",
  "¿Cómo me anoto en la lista?",
  "¿Dónde queda?",
  "¿Qué días abren?"
];
 
function addMessage(role, text) {
  const messages = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;
 
  if (role === 'bot') {
    const av = document.createElement('div');
    av.className = 'msg-avatar';
    av.textContent = 'RX';
    row.appendChild(av);
  }
 
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  row.appendChild(bubble);
 
  messages.appendChild(row);
  messages.scrollTop = messages.scrollHeight;
}
 
function showTyping() {
  const messages = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.id = 'typing-row';
 
  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.textContent = 'RX';
  row.appendChild(av);
 
  const t = document.createElement('div');
  t.className = 'typing';
  t.innerHTML = '<span></span><span></span><span></span>';
  row.appendChild(t);
 
  messages.appendChild(row);
  messages.scrollTop = messages.scrollHeight;
}
 
function removeTyping() {
  const t = document.getElementById('typing-row');
  if (t) t.remove();
}
 
function setQuickReplies(replies) {
  const container = document.getElementById('quickReplies');
  container.innerHTML = '';
  replies.forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'qr-btn';
    btn.textContent = r;
    btn.onclick = () => sendText(r);
    container.appendChild(btn);
  });
}
 
async function callClaude(userMessage) {
  history.push({ role: 'user', content: userMessage });
 
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1000,
      system: SYSTEM_PROMPT,
      messages: history
    })
  });
 
  const data = await response.json();
  const reply = data.content?.[0]?.text || 'No pude procesar tu mensaje, intentá de nuevo.';
  history.push({ role: 'assistant', content: reply });
  return reply;
}
 
async function sendText(text) {
  if (isTyping || !text.trim()) return;
  isTyping = true;
 
  document.getElementById('quickReplies').innerHTML = '';
  document.getElementById('sendBtn').disabled = true;
 
  addMessage('user', text);
  showTyping();
 
  try {
    const reply = await callClaude(text);
    removeTyping();
    addMessage('bot', reply);
 
    // Contextual quick replies after first exchange
    if (history.length === 2) {
      setQuickReplies(["¿Cómo me anoto en la lista?", "¿Dónde queda?", "¿Qué días abren?"]);
    }
  } catch (e) {
    removeTyping();
    addMessage('bot', 'Hubo un error de conexión. Intentá de nuevo en un momento.');
  }
 
  isTyping = false;
  document.getElementById('sendBtn').disabled = false;
}
 
async function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  input.value = '';
  input.style.height = 'auto';
  await sendText(text);
}
 
function resetChat() {
  history = [];
  document.getElementById('messages').innerHTML = '';
  document.getElementById('quickReplies').innerHTML = '';
  init();
}
 
// Auto-resize textarea
document.getElementById('input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
 
document.getElementById('input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});
 
async function init() {
  isTyping = true;
  showTyping();
  await new Promise(r => setTimeout(r, 800));
  removeTyping();
 
  const welcome = '¡Hola! Soy el asistente de ROX 🖤 ¿En qué te puedo ayudar?';
  addMessage('bot', welcome);
  history.push({ role: 'assistant', content: welcome });
 
  setQuickReplies(QUICK_REPLIES_INIT);
  isTyping = false;
}
 
init();
</script>
</body>
</html>
